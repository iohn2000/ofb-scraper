version: '3.8'

services:
  web:
    build: .
    container_name: ofb-stats-web
    env_file:
      - .env
    ports:
      - "5001:5000"
    volumes:
      # Mount backend folder for hot-reload
      - ./backend:/app/backend
      # Mount frontend templates for hot-reload
      - ./frontend/templates:/app/frontend/templates
      # Mount frontend static for hot-reload
      - ./frontend/static:/app/frontend/static
      # Mount database as read-only
      - ./data/club-stats.db:/app/club-stats.db:ro
    environment:
      - PYTHONUNBUFFERED=1
      - GUNICORN_WORKERS=4
      - OAUTHLIB_INSECURE_TRANSPORT=1
      - OAUTHLIB_RELAX_TOKEN_SCOPE=1
    restart: unless-stopped
    networks:
      - immich-net

networks:
  immich-net:
    external: true
