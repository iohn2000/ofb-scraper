<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÖFB Player Statistics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">ÖFB Stats</span>
            <div class="navbar-nav ms-auto">
                {% if current_user %}
                    <span class="navbar-text me-3">{{ current_user.name }} ({{ current_user.email }})</span>
                    <a class="nav-link" href="/logout">Logout</a>
                {% else %}
                    <a class="nav-link" href="{{ url_for('google.login') }}">Login with Google</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Mobile Menu Toggle Button (fixed header) -->
    <button class="mobile-menu-toggle d-lg-none" type="button" onclick="toggleMobileMenu()">
        <i class="fas fa-bars"></i>
    </button>

    <div class="d-flex min-vh-100">
        <!-- Sidebar Navigation -->
        <nav class="sidebar bg-dark" id="sidebarNav">
            <div class="sidebar-header">
                <h3 class="text-white mb-4">ÖFB Stats</h3>
                <button class="close-menu-btn d-lg-none" type="button" onclick="toggleMobileMenu()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="sidebar-menu">
                <!-- Team/Year selector -->
                <div class="px-2 mb-3">
                    <label class="text-white-50 small d-block mb-1">Age Group</label>
                    <select id="teamSelect" class="form-select form-select-sm bg-dark text-white border-secondary">
                        <option value="U13">U13</option>
                    </select>
                    <label class="text-white-50 small d-block mb-1 mt-2">Season Year</label>
                    <select id="yearSelect" class="form-select form-select-sm bg-dark text-white border-secondary">
                        <option value="2026">2026</option>
                    </select>
                    <div id="seasonDateRange" class="text-white-50 small mt-1"></div>
                </div>
                <hr class="border-secondary my-2">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
                            <i class="fas fa-clock"></i> Minutes Played
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'goals' %}active{% endif %}" href="/goals">
                            <i class="fas fa-futbol"></i> Goals Scored
                        </a>
                    </li>
                    <!--
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'efficiency' %}active{% endif %}" href="/efficiency">
                            <i class="fas fa-chart-bar"></i> Efficiency Stats
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'goal_efficiency' %}active{% endif %}" href="/goal-efficiency">
                            <i class="fas fa-star"></i> Goal Efficiency
                        </a>
                    </li>
                    -->
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'games_played' %}active{% endif %}" href="/games-played">
                            <i class="fas fa-trophy"></i> Games Played
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'player_overview' %}active{% endif %}" href="/player-overview">
                            <i class="fas fa-users"></i> Player Overview
                        </a>
                    </li>
                    <!--
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'minutes_matrix' %}active{% endif %}" href="/minutes-matrix">
                            <i class="fas fa-table"></i> Minutes Matrix
                        </a>
                    </li>
                    -->
                </ul>
            </div>
        </nav>

        <!-- Main Content Area -->
        <div class="main-content flex-grow-1">
            <div class="container-fluid p-4">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js"></script>
    <script>
        // --- Team/Year selector logic ---
        let _seasonsData = [];

        function getUrlParam(key) {
            return new URLSearchParams(window.location.search).get(key);
        }

        function getSelectedTeam() {
            return getUrlParam('team') || localStorage.getItem('selectedTeam') || 'U13';
        }

        function getSelectedYear() {
            return getUrlParam('year') || localStorage.getItem('selectedYear') || '2026';
        }

        // Returns query string like "?team=U13&year=2026"
        function getTeamParams() {
            return '?team=' + encodeURIComponent(getSelectedTeam()) + '&year=' + encodeURIComponent(getSelectedYear());
        }

        function populateDropdowns(seasons) {
            _seasonsData = seasons;
            const teamSelect = document.getElementById('teamSelect');
            const yearSelect = document.getElementById('yearSelect');
            const dateRange = document.getElementById('seasonDateRange');

            const teams = [...new Set(seasons.map(s => s.age_group))].sort();
            const selectedTeam = getSelectedTeam();
            const selectedYear = getSelectedYear();

            // Populate team dropdown
            teamSelect.innerHTML = '';
            teams.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                if (t === selectedTeam) opt.selected = true;
                teamSelect.appendChild(opt);
            });

            // Filter years for selected team
            updateYearDropdown(selectedTeam, selectedYear);
        }

        function updateYearDropdown(team, selectedYear) {
            const yearSelect = document.getElementById('yearSelect');
            const dateRange = document.getElementById('seasonDateRange');
            const years = _seasonsData
                .filter(s => s.age_group === team)
                .map(s => s.season_year)
                .sort((a, b) => b - a);

            yearSelect.innerHTML = '';
            let matchedYear = false;
            years.forEach(y => {
                const opt = document.createElement('option');
                opt.value = y;
                opt.textContent = y;
                if (String(y) === String(selectedYear)) { opt.selected = true; matchedYear = true; }
                yearSelect.appendChild(opt);
            });
            // If selected year not valid for this team, pick first
            if (!matchedYear && years.length > 0) {
                yearSelect.value = years[0];
            }

            // Show date range
            const cur = _seasonsData.find(s => s.age_group === team && String(s.season_year) === String(yearSelect.value));
            if (cur) {
                dateRange.textContent = cur.date_from + ' → ' + cur.date_to;
            } else {
                dateRange.textContent = '';
            }
        }

        function onFilterChange() {
            const team = document.getElementById('teamSelect').value;
            const year = document.getElementById('yearSelect').value;
            localStorage.setItem('selectedTeam', team);
            localStorage.setItem('selectedYear', year);
            // Update URL and reload
            const url = new URL(window.location);
            url.searchParams.set('team', team);
            url.searchParams.set('year', year);
            window.location.href = url.toString();
        }

        document.getElementById('teamSelect').addEventListener('change', function() {
            updateYearDropdown(this.value, getSelectedYear());
            onFilterChange();
        });
        document.getElementById('yearSelect').addEventListener('change', onFilterChange);

        // Load seasons on page load
        fetch('/api/seasons')
            .then(r => r.json())
            .then(seasons => {
                populateDropdowns(seasons);
                // Populate in-page team/season info banners
                const team = getSelectedTeam();
                const year = getSelectedYear();
                const cur = seasons.find(s => s.age_group === team && String(s.season_year) === String(year));
                const dateStr = cur ? ' (' + cur.date_from + ' → ' + cur.date_to + ')' : '';
                document.querySelectorAll('.team-season-info').forEach(el => {
                    el.innerHTML = '<i class="fas fa-filter me-1"></i> <strong>' + team + '</strong> &middot; Season <strong>' + year + '</strong>' + dateStr;
                });
            })
            .catch(err => console.error('Failed to load seasons:', err));

        // Toggle mobile menu
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebarNav');
            sidebar.classList.toggle('show');
            
            const links = sidebar.querySelectorAll('.nav-link');
            links.forEach(link => {
                link.addEventListener('click', () => {
                    if (window.innerWidth < 1024) {
                        sidebar.classList.remove('show');
                    }
                });
            });
        }

        // Close mobile menu when window resizes to desktop
        window.addEventListener('resize', () => {
            const sidebar = document.getElementById('sidebarNav');
            if (window.innerWidth >= 1024) {
                sidebar.classList.remove('show');
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
