{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1 class="mb-4">
            <i class="fas fa-trophy text-info"></i> Games Played Per Player
        </h1>
        <p class="text-muted mb-4">Number of games played per player.</p>
        <div class="card shadow">
            <div class="card-body">
                <p class="text-muted mb-3">Games played by each player in season 25/26 U13</p>
                <div class="table-responsive">
                    <table class="table table-striped table-hover" id="gamesPlayedTable">
                        <thead class="table-dark">
                            <tr>
                                <th>Player Name</th>
                                <th class="text-center">Number of Games</th>
                            </tr>
                        </thead>
                        <tbody id="gamesPlayedTableBody">
                            <tr>
                                <td colspan="2" class="text-center text-muted">
                                    <div class="spinner-border spinner-border-sm" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                    Loading data...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Fetch games played per player data and populate table
    fetch('/api/games-played')
        .then(response => response.json())
        .then(data => {
            const tbody = document.getElementById('gamesPlayedTableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" class="text-center text-muted">No data available</td></tr>';
                return;
            }

            data.forEach(player => {
                const row = document.createElement('tr');
                
                row.innerHTML = `
                    <td>${player.player_name}</td>
                    <td class="text-center">${player.num_games}</td>
                `;
                tbody.appendChild(row);
            });
        })
        .catch(error => {
            console.error('Error fetching games played per player data:', error);
            const tbody = document.getElementById('gamesPlayedTableBody');
            tbody.innerHTML = '<tr><td colspan="2" class="text-center text-danger">Error loading data</td></tr>';
        });
</script>
{% endblock %}
