{% extends "base.html" %}

{% block content %}
<style>
    /* Page-specific chart wrapper — avoids the global .chart-container max-height caps */
    .games-chart-scroll {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }
    .games-chart-inner {
        position: relative;
        min-width: 600px; /* prevent label crush on very narrow screens; scrolls instead */
    }
</style>
<div class="row">
    <div class="col-12">
        <h1 class="mb-4">
            <i class="fas fa-trophy text-info"></i> Games Played Per Player
        </h1>
        <p class="text-muted mb-4">Number of games played per player in season 25/26 U13.</p>
        <div class="alert alert-light py-2 px-3 mb-3 team-season-info" role="alert"></div>

        <!-- Chart card -->
        <div class="card shadow mb-4">
            <div class="card-body p-2 p-md-3">
                <div class="games-chart-scroll">
                    <div class="games-chart-inner" id="gamesChartInner">
                        <canvas id="gamesChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table card -->
        <div class="card shadow">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover" id="gamesPlayedTable">
                        <thead class="table-dark">
                            <tr>
                                <th>Player Name</th>
                                <th class="text-end">Games Played</th>
                            </tr>
                        </thead>
                        <tbody id="gamesPlayedTableBody">
                            <tr>
                                <td colspan="2" class="text-center text-muted">
                                    <div class="spinner-border spinner-border-sm" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                    Loading data...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    fetch('/api/games-played' + getTeamParams())
        .then(response => response.json())
        .then(data => {
            const labels = data.map(p => p.player_name);
            const values = data.map(p => p.num_games);

            initHorizontalBarChart({
                canvasId: 'gamesChart',
                containerId: 'gamesChartInner',
                labels: labels,
                data: values,
                datasetLabel: 'Games Played',
                color: 'rgba(23, 162, 184, 0.8)',
                borderColor: 'rgba(23, 162, 184, 1)',
                xAxisTitle: 'Games',
                integerTicks: true
            });

            const tbody = document.getElementById('gamesPlayedTableBody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="2" class="text-center text-muted">No data available</td></tr>';
                return;
            }
            tbody.innerHTML = '';
            data.forEach(player => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${player.player_name}</td><td class="text-end">${player.num_games}</td>`;
                tbody.appendChild(tr);
            });
        })
        .catch(error => {
            console.error('Error fetching games played data:', error);
            const tbody = document.getElementById('gamesPlayedTableBody');
            tbody.innerHTML = '<tr><td colspan="2" class="text-center text-danger">Error loading data</td></tr>';
        });
</script>
{% endblock %}
